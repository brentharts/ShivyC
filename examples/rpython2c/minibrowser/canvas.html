<html>
<head>
<title>native canvas</title>
<script type="rpython" id="shader">
def pixel(x: int, y: int, t: int, mx: int, my: int) -> int:
    # animated plasma (shifts with time t) that brightens near the pointer
    r = (x * 5 + t * 3) & 255
    g = (y * 5 + t * 2) & 255
    b = ((x + y) * 3 + t) & 255
    dx = x - mx
    dy = y - my
    if dx * dx + dy * dy < 200:
        r = 255
        g = 255
    return (255 << 24) | (r << 16) | (g << 8) | b
</script>
</head>
<body>
<h1>native canvas</h1>
<canvas id="cvs" width="96" height="96"></canvas>
</body>
</html>
