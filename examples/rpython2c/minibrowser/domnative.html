<html>
<head>
<script type="typescript" id="dnmod">
function setLabel(handle: number): number {
    dom_set_text(handle, "set natively by TypeScript");
    return 0;
}
</script>
<script type="python">
import ctypes
dll = ctypes.CDLL('/tmp/jit.dnmod.so')
def run():
    el = document.getElementById('OUT')
    dll.setLabel(el._handle)
</script>
</head>
<body>
<h1>native dom write</h1>
<div id="OUT">unset</div>
<button onclick="run()">go</button>
</body>
</html>
